<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Barcode Lists</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h2>Barcode Lists</h2>
      <div class="login-form">
        <input type="text" id="loginStore" placeholder="Store number (e.g., FMC07)" autocomplete="off" />
        <input type="password" id="loginPassword" placeholder="Password (e.g., fmc07)" />
        <button id="loginBtn">Login</button>
      </div>
      <p id="loginError" class="login-error"></p>
      <p class="login-hint">New stores will be created automatically</p>
    </div>
  </div>

  <div id="mainApp" class="container" style="display: none;">
    <div class="sidebar">
      <div class="sidebar-header">
        <span id="storeLabel">Store</span>
        <div class="sidebar-actions">
          <span id="syncStatus" class="sync-status" title="Sync status"></span>
          <span id="logoutBtn" class="icon-btn" title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          </span>
          <span id="addCategoryBtn" class="icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
          </span>
        </div>
      </div>
      <ul id="categoryList"></ul>
    </div>

    <div class="main">
      <div class="main-header">
        <div class="header-row">
          <input id="categoryName" />
          <div class="header-buttons">
            <button id="renameCategoryBtn">Rename</button>
            <button id="deleteCategoryBtn">Delete</button>
          </div>
        </div>
      </div>

      <div class="input-row">
        <input id="barcodeInput" placeholder="Enter barcode..." />
        <button id="uploadBtn" class="icon-btn-sm" title="Upload Excel or Image">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        </button>
        <button id="settingsBtn" class="icon-btn-sm" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v10M4.22 4.22l4.24 4.24m7.08 7.08l4.24 4.24M1 12h6m6 0h10M4.22 19.78l4.24-4.24m7.08-7.08l4.24-4.24"/></svg>
        </button>
      </div>

      <ul id="barcodeList"></ul>
    </div>
  </div>

  <div id="toast"></div>

  <div id="reviewModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Review Extracted Barcodes</h3>
        <span id="closeReviewModal" class="modal-close">&times;</span>
      </div>
      <div id="reviewContent" class="modal-body"></div>
      <div class="modal-footer">
        <button id="selectAllBtn">Select All</button>
        <button id="deselectAllBtn">Deselect All</button>
        <div class="modal-actions">
          <button id="cancelReviewBtn" class="cancel-btn">Cancel</button>
          <button id="addSelectedBtn" class="add-btn">Add Selected</button>
        </div>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal" style="display: none;">
    <div class="modal-content settings-modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <span id="closeSettingsModal" class="modal-close">&times;</span>
      </div>
      <div class="modal-body">
        <label class="settings-label">OpenRouter API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." class="settings-input" />
        <p class="settings-hint">Get your free API key from <a href="#" id="openrouterLink">openrouter.ai</a></p>
        <div id="apiKeyStatus" class="api-key-status"></div>
      </div>
      <div class="modal-footer">
        <button id="saveSettingsBtn" class="add-btn">Save</button>
        <button id="cancelSettingsBtn" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".xlsx,.xls,.png,.jpg,.jpeg,.gif,.bmp,.webp" style="display: none;" />

  <script src="xlsx.full.min.js"></script>
  <script src="openrouter.js"></script>
  <script src="supabase.js"></script>
  <script src="popup.js"></script>
</body>
</html>
